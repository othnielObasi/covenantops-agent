services:
  api:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://covenantops:covenantops@db:5432/covenantops
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/data:/app/data
    # Reachable only inside the compose network (via the web reverse proxy),
    # not published to the host.
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build: ./frontend
    restart: unless-stopped
    # Single public entry point: nginx serves the SPA and proxies /api -> api:8000.
    ports:
      - "80:80"
    depends_on:
      - api

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_USER=covenantops
      - POSTGRES_PASSWORD=covenantops
      - POSTGRES_DB=covenantops
    # Internal only — the database is not published to the host.
    expose:
      - "5432"
    volumes:
      - covenantops_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U covenantops -d covenantops"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  covenantops_pgdata:
