<!doctype html>
<html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CovenantOps Agent</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#0A0A0F;color:#E0E0E8;font-family:'IBM Plex Mono','JetBrains Mono',ui-monospace,monospace;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:1200px;margin:0 auto;padding:0 24px}
.bggrid{position:fixed;inset:0;opacity:.035;background-image:linear-gradient(#FF4444 1px,transparent 1px),linear-gradient(90deg,#FF4444 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
a{color:inherit;text-decoration:none}
button{font-family:inherit}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#1E1E2E;border-radius:4px}

/* ---- shared ---- */
.logomark{background:linear-gradient(135deg,#FF4444,#FF8C42);border-radius:8px;display:grid;place-items:center;font-weight:800;color:#0A0A0F}
.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;border:1px solid;padding:3px 10px;font-size:11px;font-weight:600;letter-spacing:.02em}
.pill.signal{background:#06D6A020;color:#06D6A0;border-color:#06D6A040}
.pill.amber{background:#FFD16620;color:#FFD166;border-color:#FFD16640}
.pill.oxblood{background:#FF444420;color:#FF4444;border-color:#FF444440}
.pill.mute{background:#1E1E2E;color:#8B8BA0;border-color:#2E2E3E}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}

/* ---- landing ---- */
.lnav{padding:20px 40px;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:10}
.lbrand{display:flex;align-items:center;gap:14px}
.lsignin{padding:10px 28px;border-radius:8px;border:1px solid #FF444460;background:transparent;color:#FF4444;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.lsignin:hover{background:#FF4444;color:#fff}
.hero{padding:64px 40px 60px;max-width:1200px;margin:0 auto;position:relative;z-index:10}
.eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:24px}
.eyebrow .line{width:32px;height:1px;background:#FF4444}
.eyebrow span{font-size:11px;color:#FF4444;text-transform:uppercase;letter-spacing:3px;font-weight:600}
h1.hero-title{font-size:52px;font-weight:800;color:#E0E0E8;line-height:1.08;margin:0 0 24px;max-width:820px;letter-spacing:-1px}
h1.hero-title .grad{background:linear-gradient(135deg,#FF4444,#FF8C42);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{font-size:16px;color:#8B8BA0;line-height:1.7;max-width:640px;margin:0 0 40px}
.hero-ctas{display:flex;gap:12px;margin-bottom:64px;flex-wrap:wrap}
.btn-primary{padding:14px 36px;border-radius:8px;border:none;background:linear-gradient(135deg,#FF4444,#FF6644);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 24px #FF444440;letter-spacing:.3px}
.btn-primary:hover{transform:translateY(-2px)}
.btn-ghost{padding:14px 28px;border-radius:8px;border:1px solid #2E2E3E;background:transparent;color:#8B8BA0;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-ghost:hover{border-color:#4E4E60;color:#E0E0E8}
.statstrip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#1E1E2E;border-radius:12px;overflow:hidden;margin-bottom:64px}
.statcell{padding:28px 24px;background:#101018}
.statval{font-size:32px;font-weight:800;color:#E0E0E8}
.statlabel{font-size:12px;color:#8B8BA0;font-weight:600;margin-top:4px}
.statsub{font-size:10px;color:#4E4E60;margin-top:2px}
.featgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:64px}
.featcard{padding:32px 28px;border-radius:12px;border:1px solid #1E1E2E;background:#0D0D14;transition:all .25s ease;cursor:default}
.featcard:hover{transform:translateY(-4px);background:#101018;border-color:color-mix(in srgb, var(--accent) 25%, transparent)}
.feat-icon{font-size:13px;font-weight:700;letter-spacing:.1em;margin-bottom:18px;color:var(--accent);opacity:.7;transition:opacity .25s}
.featcard:hover .feat-icon{opacity:1}
.feat-title{font-size:15px;font-weight:700;color:#E0E0E8;margin-bottom:10px}
.feat-desc{font-size:12px;color:#6B6B80;line-height:1.7}
.feat-rule{width:32px;height:2px;background:#1E1E2E;margin-top:20px;border-radius:1px;transition:all .3s}
.featcard:hover .feat-rule{width:40px;background:var(--accent)}
.archbox{background:#101018;border:1px solid #1E1E2E;border-radius:12px;padding:32px;margin-bottom:48px}
.archkick{font-size:10px;color:#6B6B80;text-transform:uppercase;letter-spacing:2px;margin-bottom:20px}
.archflow{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.archstep{padding:10px 18px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.3px}
.archarrow{color:#2E2E3E;font-size:18px}
.archnote{text-align:center;margin-top:16px;font-size:11px;color:#4E4E60}
.lfooter{display:flex;justify-content:space-between;align-items:center;padding:20px 0;border-top:1px solid #1E1E2E;font-size:11px;color:#4E4E60;flex-wrap:wrap;gap:8px}

/* ---- signin ---- */
.signin-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative}
.signin-box{width:400px;position:relative;z-index:10}
.signin-card{background:#101018;border:1px solid #1E1E2E;border-radius:14px;padding:36px;box-shadow:0 8px 40px rgba(0,0,0,.4)}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;color:#6B6B80;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.field input{width:100%;padding:12px 14px;border-radius:8px;border:1px solid #2E2E3E;background:#16161F;color:#E0E0E8;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.field input:focus{border-color:#FF444460}
.signin-btn{width:100%;padding:14px;border-radius:8px;border:none;background:linear-gradient(135deg,#FF4444,#FF6644);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 24px #FF444430;letter-spacing:.3px}
.signin-btn:disabled{background:#2E2E3E;box-shadow:none;cursor:wait}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #ffffff40;border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sso-btn{width:100%;padding:12px;border-radius:8px;border:1px solid #2E2E3E;background:transparent;color:#8B8BA0;font-size:12px;font-weight:500;cursor:pointer;margin-top:16px;transition:all .15s}
.sso-btn:hover{border-color:#4E4E60}
.envbadge{text-align:center;margin-top:24px}

/* ---- app shell ---- */
.topbar{background:#101018;border-bottom:1px solid #1E1E2E;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{font-size:15px;font-weight:600;color:#E0E0E8;letter-spacing:.5px}
.brandsub{font-size:10px;color:#6B6B80;letter-spacing:1.5px;text-transform:uppercase}
.navtabs{display:flex;gap:2px;background:#16161F;border-radius:8px;padding:3px}
.navbtn{padding:8px 16px;border-radius:6px;border:none;background:transparent;color:#6B6B80;cursor:pointer;font-size:12px;font-weight:400;transition:all .15s}
.navbtn.active{background:#1E1E2E;color:#E0E0E8;font-weight:600}
main{padding:24px 0 96px;position:relative;z-index:1}
.grid2{display:grid;gap:20px}
.grid3{display:grid;gap:20px}
@media(min-width:1024px){.grid2.a{grid-template-columns:1.1fr 1fr}.grid2.b{grid-template-columns:1.2fr 1fr}.grid2.c{grid-template-columns:1fr 1fr}.grid3{grid-template-columns:repeat(3,1fr)}}
.card{background:#101018;border:1px solid #1E1E2E;border-radius:10px;padding:20px;margin-bottom:16px}
.cardhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cardtitle{font-size:13px;font-weight:600;color:#8B8BA0;text-transform:uppercase;letter-spacing:1px}
.cardkick{font-size:11px;color:#4E4E60;text-transform:uppercase;letter-spacing:1px}
.stack>*+*{margin-top:16px}
p.lead{font-size:13px;line-height:1.6;color:#8B8BA0;margin:0 0 16px}
.runbtn{width:100%;border:none;border-radius:8px;background:linear-gradient(135deg,#FF4444,#FF6644);color:#fff;font-weight:700;font-size:14px;padding:14px;cursor:pointer;box-shadow:0 4px 24px #FF444430;transition:all .2s}
.runbtn:hover{transform:translateY(-2px)}
.ghostbtn{width:100%;border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;background:#06D6A015;border:1px solid #06D6A040;color:#06D6A0;margin-bottom:10px;transition:all .15s}
.ghostbtn:hover{background:#06D6A025}
.dangerbtn{width:100%;border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;background:#FF444415;border:1px solid #FF444440;color:#FF4444;margin-bottom:16px;transition:all .15s}
.dangerbtn:hover{background:#FF444425}
.proof{display:grid;grid-template-columns:1fr 1fr;gap:8px 24px;font-size:13px;color:#B8B8C8}
ol.flow{list-style:none;margin:0;padding:0}
ol.flow li{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.num{margin-top:1px;width:20px;height:20px;flex:none;border-radius:999px;display:grid;place-items:center;font-size:11px;background:#1E1E2E;color:#6B6B80}
.num.done{background:#06D6A0;color:#0A0A0F}
.gauge+.gauge{margin-top:16px}
.grow{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px}
.glabel{font-size:13px;color:#B8B8C8}
.gval{font-size:13px;font-weight:700}
.bar{position:relative;height:8px;border-radius:999px;background:#1E1E2E;overflow:hidden}
.barfill{height:100%;border-radius:999px;transition:width .8s ease}
.gmark{position:absolute;top:0;bottom:0;left:66%;width:2px;background:#4E4E60}
.gscale{display:flex;justify-content:space-between;margin-top:4px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#4E4E60}
table{width:100%;border-collapse:separate;border-spacing:0 4px;font-size:13px}
th{text-align:left;padding:8px 12px;font-size:10px;color:#6B6B80;text-transform:uppercase;letter-spacing:1px;font-weight:500}
td{padding:10px 12px;background:#16161F;white-space:nowrap}
tr td:first-child{border-radius:6px 0 0 6px}
tr td:last-child{border-radius:0 6px 6px 0}
.tblwrap{overflow-x:auto}
pre.memo{white-space:pre-wrap;font-size:12px;line-height:1.65;color:#C8C8D8;margin:0}
.scorerow{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.slabel{width:170px;flex:none;font-size:12px;color:#B8B8C8}
.sbar{flex:1;height:6px;border-radius:999px;background:#1E1E2E;overflow:hidden}
.sfill{height:100%;border-radius:999px;transition:width .6s ease}
.sval{width:36px;text-align:right;font-size:12px;font-weight:700}
.warn{font-size:12px;color:#B8B8C8;margin-bottom:8px}
.chk{font-size:13px;color:#B8B8C8;margin-bottom:8px}
.seal{display:inline-flex;align-items:center;gap:12px;border-radius:8px;border:1px solid;padding:12px 16px;animation:pop .5s cubic-bezier(.2,.8,.2,1) both}
@keyframes pop{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
.sealic{width:36px;height:36px;border-radius:999px;display:grid;place-items:center;font-size:18px;color:#0A0A0F}
.empty{text-align:center;padding:48px 0;font-size:12px;color:#4E4E60}
.qachip{padding:6px 12px;border-radius:16px;border:1px solid #2E2E3E;background:transparent;color:#8B8BA0;font-size:11px;cursor:pointer;transition:all .15s;margin:0 6px 6px 0}
.qachip:hover{border-color:#4CC9F040;color:#4CC9F0}
.qamsgs{max-height:280px;overflow-y:auto;margin-bottom:12px;padding:4px 0}
.qarow{display:flex;gap:10px;margin-bottom:12px}
.qarow.user{flex-direction:row-reverse}
.qaavatar{width:24px;height:24px;border-radius:6px;flex:none;display:grid;place-items:center;font-size:10px;font-weight:700}
.qabubble{max-width:78%;padding:10px 14px;border-radius:10px;font-size:12px;color:#C0C0D0;line-height:1.7}
.qagovbadge{display:flex;align-items:center;gap:6px;margin-top:6px;padding-top:6px;border-top:1px solid #1E1E2E;font-size:9px;color:#4E4E60}
.qainput{flex:1;padding:10px 14px;border-radius:8px;border:1px solid #2E2E3E;background:#16161F;color:#E0E0E8;font-size:12px;font-family:inherit;outline:none;transition:border-color .2s}
.qainput:focus{border-color:#4CC9F040}
.tlrow{display:flex;gap:16px;padding:12px 0;border-bottom:1px solid #1E1E2E}
.tlrow:last-child{border-bottom:none}
.tlstep{width:56px;flex:none;font-size:11px;color:#6B6B80}
.tldotwrap{width:8px;display:flex;flex-direction:column;align-items:center;flex:none}
.tldot{width:8px;height:8px;border-radius:50%;flex:none}
.tlline{width:1px;flex:1;background:#1E1E2E;margin-top:4px}
.tlbody{flex:1}
.tlhead{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.tltag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:9px;background:#1E1E2E;color:#8B8BA0}
.tldetail{font-size:12px;color:#8B8BA0}
@keyframes halogrow{0%{opacity:.6;transform:scale(1)}70%{opacity:0;transform:scale(1.9)}100%{opacity:0;transform:scale(1.9)}}
.pulse-halo{transform-origin:center;transform-box:fill-box;animation:halogrow 2s ease-out infinite}
</style></head>

    var govBadge = !isUser ? '<div class="qagovbadge"><span style="width:10px;height:10px;border-radius:2px;background:linear-gradient(135deg,'+C.oxblood+',#FF8C42);display:inline-block"></span><span style="color:'+C.signal+'">governed</span><span>\u00b7 answered from this run\'s evidence only</span></div>' : "";
    return '<div class="qarow'+(isUser?" user":"")+'"><div class="qaavatar" style="background:'+avatarBg+';color:'+avatarColor+'">'+(isUser?"A1":"AI")+'</div>'+
      '<div class="qabubble" style="background:'+(isUser?C.signal+"10":"#16161F")+';border:1px solid '+(isUser?C.signal+"20":"#1E1E2E")+'">'+esc(m.content)+govBadge+'</div></div>';
  }).join("");
  var loading = qaLoading ? '<div class="qarow"><div class="qaavatar" style="background:#FF8C4220;color:#FF8C42">AI</div><div class="qabubble" style="background:#16161F;border:1px solid #1E1E2E;color:'+C.mute+'">Reviewing this run\'s evidence\u2026</div></div>' : "";
  var body;
  if(!qaOpen){
    body = '<button class="ghostbtn" style="margin:0" onclick="toggleQa()">Open Q&amp;A</button>';
  } else {
    body = (qaMessages.length ? '<div class="qamsgs">'+msgs+loading+'</div>' : '<div style="margin-bottom:12px">'+chips+'</div>') +
      '<input id="qaInputBox" class="qainput" type="text" placeholder="Ask about this investigation\u2026" value="'+esc(qaInput)+'" onkeydown="qaKeydown(event)"/>';
  }
  return panel("Ask the agent","clarifying Q&amp;A",body);
}
function seal(){
  if(verify=="idle")return "";
  var valid=verify=="valid",checking=verify=="checking";
  var bc=valid?"#06D6A040":checking?"#2E2E3E":"#FF444440";
  var bg=valid?"#06D6A012":checking?"#16161F":"#FF444412";
  var ic=valid?C.signal:checking?"#2E2E3E":C.oxblood;
  var sym=valid?"\u2713":checking?"\u22EF":"\u2717";
  var t1=valid?"Receipt verified":checking?"Verifying\u2026":"Verification failed";
  var t2=valid?"hash MATCH \u00b7 Ed25519 VALID":checking?"recomputing hash \u00b7 checking signature":"hash MISMATCH \u00b7 do not trust";
  var tc=valid?C.signal:checking?"#E0E0E8":C.oxblood;
  return '<div class="seal" style="border-color:'+bc+';background:'+bg+'"><div class="sealic" style="background:'+ic+'">'+sym+'</div><div><div style="font-size:14px;font-weight:700;color:'+tc+'">'+t1+'</div><div style="font-size:11px;color:'+C.mute+'">'+t2+'</div></div></div>';
}
function wrapLabel(label,max){
  var words=String(label).split(" "), lines=[], cur="";
  words.forEach(function(w){if((cur+" "+w).trim().length>max){lines.push(cur.trim());cur=w;}else cur=(cur+" "+w).trim();});
  if(cur)lines.push(cur);
  return lines.slice(0,2);
}
function evidenceGraph(run){
  var em=run.evidence_map||[];
  if(!em.length)return '<div class="empty">Run a check to build the evidence graph.</div>';
  var w=520,h=420,cx=w/2,cy=h/2-10,R=150;
  var kindColor=function(k){return k=="covenant"?C.amber:(k=="receipt"||k=="guard")?C.signal:C.mute;};
  var nodeStatus=function(e){if(e.kind!="covenant")return "ok";var s=(e.summary||"").toLowerCase();if(s.indexOf("breach")>=0)return "breach";if(s.indexOf("drifting")>=0)return "drift";return "ok";};
  var statusColorMap={breach:C.oxblood,drift:C.amber,ok:C.signal};
  var centerColor=run.severity=="breach"?C.oxblood:run.severity=="watch"?C.amber:C.signal;
  var n=em.length;
  var nodes=em.map(function(e,i){var ang=(-90+(360/n)*i)*Math.PI/180;var x=cx+R*Math.cos(ang),y=cy+R*Math.sin(ang);var st=nodeStatus(e);return {x:x,y:y,e:e,color:statusColorMap[st]||kindColor(e.kind),status:st};});
  var edges=nodes.map(function(nd){var breach=nd.status=="breach";return '<line x1="'+cx+'" y1="'+cy+'" x2="'+nd.x+'" y2="'+nd.y+'" stroke="'+nd.color+'" stroke-width="'+(breach?2.5:1.5)+'" opacity="'+(breach?0.85:0.45)+'" stroke-dasharray="'+(nd.status=="drift"?"4 3":"none")+'"/>';}).join("");
  var nodeEls=nodes.map(function(nd){
    var r=nd.status=="breach"?13:10;
    var halo=nd.status=="breach"?'<circle cx="'+nd.x+'" cy="'+nd.y+'" r="'+r+'" fill="none" stroke="'+nd.color+'" stroke-width="2" class="pulse-halo"/>':'';
    var labelLines=wrapLabel(nd.e.label||"",22);
    var ty0=nd.y+r+14;
    var textEls=labelLines.map(function(line,li){return '<text x="'+nd.x+'" y="'+(ty0+li*12)+'" text-anchor="middle" font-size="10" fill="#E0E0E8" opacity="0.85">'+esc(line)+'</text>';}).join("");
    return '<g>'+halo+'<circle cx="'+nd.x+'" cy="'+nd.y+'" r="'+r+'" fill="'+nd.color+'" opacity="0.9"/><circle cx="'+nd.x+'" cy="'+nd.y+'" r="'+r+'" fill="none" stroke="'+C.ink+'" stroke-width="1.5"/>'+textEls+'</g>';
  }).join("");
  var centerHalo=run.severity=="breach"?'<circle cx="'+cx+'" cy="'+cy+'" r="30" fill="none" stroke="'+centerColor+'" stroke-width="2.5" class="pulse-halo"/>':'';
  var centerNode='<g>'+centerHalo+'<circle cx="'+cx+'" cy="'+cy+'" r="30" fill="'+centerColor+'" opacity="0.95"/><circle cx="'+cx+'" cy="'+cy+'" r="30" fill="none" stroke="'+C.ink+'" stroke-width="2"/>'+
    '<text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" font-size="10" font-weight="700" fill="'+C.ink+'">DECISION</text>'+
    '<text x="'+cx+'" y="'+(cy+9)+'" text-anchor="middle" font-size="9" fill="'+C.ink+'">'+esc(run.severity)+'</text></g>';
  var svg='<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:auto;max-height:440px">'+edges+centerNode+nodeEls+'</svg>';
  var legend='<div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;font-size:11px;color:'+C.mute+'">'+
    '<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+C.oxblood+';margin-right:5px"></span>breach</span>'+
    '<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+C.amber+';margin-right:5px"></span>drifting</span>'+
    '<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+C.signal+';margin-right:5px"></span>governed / verified</span></div>';
  return svg+legend;
}
function buildAuditTimeline(run){
  var actorColor = {agent:"#FF8C42", governance:C.oxblood, system:"#4CC9F0"};
  var guardPath = (run.evaluation && run.evaluation.signals && run.evaluation.signals.guard_path) || "local_fallback";
  var events = [];
  events.push({actor:"agent", action:"investigation planned", entity:run.borrower, detail:"Plan created before any retrieval \u2014 the agent decides its own steps for this facility."});
  events.push({actor:"agent", action:"clauses retrieved", entity:"credit_agreement.pdf", detail:"Retrieved "+(run.findings||[]).length+" governing covenant clause(s) from the signed agreement."});
  events.push({actor:"agent", action:"filings retrieved", entity:(run.findings&&run.findings[0]&&run.findings[0].ratio.period)||"latest period", detail:"Pulled borrower filings to establish the trend for the current reporting period."});
  events.push({actor:"governance", action:"tool calls evaluated", entity:guardPath, detail:"Every tool call in this run was evaluated by the "+(guardPath=="airg"?"AIRG governance API":"local fallback guard")+"; no blocks raised on clean evidence."});
  (run.findings||[]).forEach(function(f){
    events.push({actor:"agent", action:"ratio calculated", entity:f.ratio.covenant_id, detail:f.ratio.metric+": "+f.ratio.value+" vs effective limit "+f.ratio.threshold+(f.ratio.waiver_applied?" (waiver "+f.ratio.waiver_applied+" applied)":"")+"."});
  });
  var flaggedCovs = (run.findings||[]).filter(function(f){return f.ratio.breached||f.ratio.drifting_toward_breach;});
  if(flaggedCovs.length) events.push({actor:"agent", action:"transactions cross-checked", entity:flaggedCovs.length+" covenant(s)", detail:"Matched transactions to a documented cause for each flagged covenant; unexplained items are reported, not hidden."});
  events.push({actor:"agent", action:"memo generated", entity:run.severity, detail:"Escalation memo produced with citations to source page and transaction IDs for every claim."});
  events.push({actor:"system", action:"receipt signed", entity:(run.trace_id||"").slice(0,14), detail:"Ed25519 signature applied over the canonical evidence body \u2014 verifiable offline, independent of this run."});

  var rows = events.map(function(e,i){
    var last = i===events.length-1;
    return '<div class="tlrow"><div class="tlstep">step '+(i+1)+'</div>'+
      '<div class="tldotwrap"><div class="tldot" style="background:'+(actorColor[e.actor]||C.mute)+'"></div>'+(last?"":'<div class="tlline"></div>')+'</div>'+
      '<div class="tlbody"><div class="tlhead"><span style="font-weight:600;font-size:12px;color:'+(actorColor[e.actor]||"#8B8BA0")+'">'+e.actor+'</span>'+
      '<span class="tltag">'+esc(e.action)+'</span><span class="tltag">'+esc(e.entity)+'</span></div>'+
      '<div class="tldetail">'+esc(e.detail)+'</div></div></div>';
  }).join("");
  return rows;
}
function vEval(){
  var run=currentRun, ch=run.context_health||{};
  var scores=Object.keys(run.evaluation.scores).map(function(k){return scorebar(k,run.evaluation.scores[k]);}).join("");
  var graph=evidenceGraph(run);
  var warns=(ch.warnings||[]).map(function(w){return '<div class="warn">\u26A0 '+esc(w)+'</div>';}).join("")||'<div class="warn">\u2713 No major context warnings</div>';
  var vultr=["Web-based enterprise agent","LLM/RAG workloads route to Vultr Serverless Inference when configured","Deterministic fallback keeps demo reliable","Docker-ready for Vultr Cloud Compute"].map(function(x){return '<div class="chk">\u2713 '+x+'</div>';}).join("");
  var auditNote='<div style="font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:'+C.signal+';margin:0 0 12px">Audit &amp; integrity \u2014 relevant to compliance review</div>';
  var timeline = panel("Audit trail", events_count_label(run),buildAuditTimeline(run));
  var auditSection=timeline+'<div class="grid2 c" style="margin-top:20px">'+panel("Evidence graph","decision \u2192 evidence",graph)+panel("Context health",(ch.overall||"checked"),warns)+'</div>';
  var engNote='<div style="font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:'+C.mute+';margin:28px 0 12px">Engineering diagnostics \u2014 internal only, not part of any user workflow</div>';
  var engSection='<div class="grid2 c">'+panel("System readiness","self-evaluation",scores)+panel("Platform alignment","no GPU dependency",vultr)+'</div>';
  return auditNote+auditSection+engNote+engSection;
}
function events_count_label(run){
  var n = 4 + (run.findings||[]).length + ((run.findings||[]).some(function(f){return f.ratio.breached||f.ratio.drifting_toward_breach;})?1:0);
  return n+" events \u00b7 agent, governance, system";
}
function vHistory(){
  // LIVE-WIRING NOTE: reads currentHistory directly; swap to api.getHistory(currentBorrowerId) when wiring live data.
  var hist=currentHistory.slice().reverse();
  var series=hist.map(function(r,i){return {run:"#"+(i+1),confidence:Math.round(parseFloat(r.confidence)*100)};});
  var w=900,h=180,pad=30;
  var pts=series.map(function(s,i){var x=pad+(i*(w-2*pad)/(series.length-1));var y=h-pad-(s.confidence/100)*(h-2*pad);return [x,y];});
  var path=pts.map(function(p,i){return (i?"L":"M")+p[0]+","+p[1];}).join(" ");
  var dots=pts.map(function(p){return '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="3" fill="'+C.signal+'"/>';}).join("");
  var labels=series.map(function(s,i){var x=pad+(i*(w-2*pad)/(series.length-1));return '<text x="'+x+'" y="'+(h-8)+'" fill="'+C.mute+'" font-size="11" text-anchor="middle">'+s.run+'</text>';}).join("");
  var svg='<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:200px"><line x1="'+pad+'" y1="'+(h-pad)+'" x2="'+(w-pad)+'" y2="'+(h-pad)+'" stroke="#1E1E2E"/><line x1="'+pad+'" y1="'+pad+'" x2="'+pad+'" y2="'+(h-pad)+'" stroke="#1E1E2E"/><line x1="'+pad+'" y1="'+pad+'" x2="'+(w-pad)+'" y2="'+pad+'" stroke="'+C.signal+'" stroke-dasharray="3 3" opacity=".4"/><path d="'+path+'" fill="none" stroke="'+C.signal+'" stroke-width="2"/>'+dots+labels+
    '<text x="'+(pad-8)+'" y="'+(pad+4)+'" fill="'+C.mute+'" font-size="11" text-anchor="end">100</text><text x="'+(pad-8)+'" y="'+(h-pad)+'" fill="'+C.mute+'" font-size="11" text-anchor="end">0</text></svg>';
  var rows=currentHistory.map(function(r){return '<tr><td style="font-size:12px;color:'+C.mute+'">'+esc(r.run_id.slice(0,14))+'</td><td style="color:#E0E0E8">'+esc(r.borrower)+'</td><td>'+pill(r.severity,"oxblood")+'</td><td>'+Math.round(parseFloat(r.confidence)*100)+'%</td></tr>';}).join("");
  var tbl='<div class="tblwrap"><table><thead><tr><th>Run</th><th>Borrower</th><th>Severity</th><th>Confidence</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  return '<div class="stack">'+panel("Confidence across runs","self-improvement",svg)+panel("Run history","persistent",tbl)+'</div>';
}

  var body;
  if(view=="Portfolio")body=vPortfolio();
  else if(view=="Investigation")body=vInvestigation();
  else if(view=="Diagnostics")body=vEval();
  else body=vHistory();
  var tabs=VIEWS.map(function(v){return '<button class="navbtn'+(v==view?' active':'')+'" onclick="setView(\''+v+'\')">'+v+'</button>';}).join("");
  document.getElementById("app").innerHTML=
    '<div class="topbar"><div class="lbrand"><div class="logomark" style="width:32px;height:32px;font-size:15px">C</div>'+
    '<div><div class="brand">CovenantOps Agent</div><div class="brandsub">covenantops \u00b7 verifiable covenant monitoring</div></div></div>'+
    '<div style="display:flex;align-items:center;gap:12px"><div class="navtabs">'+tabs+'</div><span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:'+C.mute+'"><span style="width:6px;height:6px;border-radius:50%;background:'+C.signal+';box-shadow:0 0 6px '+C.signal+'"></span>system operational</span></div></div>'+
    '<main><div class="wrap">'+body+'</div></main>';

function setView(v){view=v;render();}
var QA_SUGGESTIONS = ["Why is the leverage covenant flagged?","What's the unexplained transaction?","Is a waiver active?","What's the recommended action?"];
var currentRun = DATA.borrowers.meridian.run; // replaced by api.runInvestigation()'s resolved result on each run
var currentEvidence = DATA.borrowers.meridian.evidence; // replaced by api.getEvidence()'s resolved result
var currentHistory = DATA.borrowers.meridian.history; // replaced by api.getHistory()'s resolved result
var qaOpen = false, qaMessages = [], qaInput = "", qaLoading = false;

function openInvestigation(id){
  currentBorrowerId = id || currentBorrowerId;
  currentRun = DATA.borrowers[currentBorrowerId].run; // preload identity for the header before running
  ran=false; step=-1; verify="idle"; qaOpen=false; qaMessages=[];
  view="Investigation"; render();
}
function doRun(){
  ran=false;step=0;verify="idle";render();
  var fetchDone=false, animDone=false, result=null;
  function maybeFinish(){ if(fetchDone && animDone){ currentRun=result; ran=true; render(); } }
  api.runInvestigation(currentBorrowerId, {}).then(function(r){ result=r; fetchDone=true; maybeFinish(); });
  api.getEvidence(currentBorrowerId).then(function(ev){ currentEvidence = ev; });
  api.getHistory(currentBorrowerId).then(function(h){ currentHistory = h; });
  var s=0;var t=setInterval(function(){s++;step=s;if(s>=STEPS.length-1){clearInterval(t);animDone=true;maybeFinish();}render();},240);
}
function doVerify(){
  verify="checking";render();
  api.verifyReceipt(currentRun.trace_id, false).then(function(res){ verify = res.valid ? "valid" : "invalid"; render(); });
}
function doTamper(){
  verify="checking";render();
  api.verifyReceipt(currentRun.trace_id, true).then(function(res){ verify = res.valid ? "valid" : "invalid"; render(); });
}

// --- Ask the Agent: clarifying Q&A grounded in the current run's data ---
// LIVE-WIRING NOTE: today this answers from currentRun via keyword matching (same
// pattern as demo Q&A). Wire to a real endpoint (e.g. POST /api/covenant/qa) that
// lets the agent answer with tool access to the same evidence, governed the same
// way as every other tool call.
function toggleQa(){ qaOpen = true; render(); document.getElementById("qaInputBox").focus(); }
function suggestQa(i){ qaInput = QA_SUGGESTIONS[i]; render(); document.getElementById("qaInputBox").focus(); }
function qaKeydown(e){
  if(e.key !== "Enter") return;
  var question = e.target.value.trim();
  if(!question || qaLoading) return;
  qaMessages.push({role:"user", content:question});
  qaInput=""; qaLoading=true; render();
  setTimeout(function(){
    qaMessages.push({role:"assistant", content: answerQa(question)});
    qaLoading=false; render();
    var box=document.getElementById("qaInputBox"); if(box) box.focus();
  }, 700 + Math.random()*500);
}
function answerQa(q){
  var run=currentRun, lq=q.toLowerCase();
  var unexplained = [];
  (run.findings||[]).forEach(function(f){ if(f.cross_check) (f.cross_check.unexplained||[]).forEach(function(u){ unexplained.push(u); }); });
  if(lq.indexOf("unexplained")>=0 || lq.indexOf("txn-4420")>=0 || lq.indexOf("intercompany")>=0){
    var u = unexplained[0];
    return u ? "Transaction "+u.id+" ("+u.note+", "+fmtMoney(u.amount)+") could not be matched to a documented cause. It's the reason overall confidence is "+Math.round(run.confidence*100)+"% rather than higher \u2014 it needs a human explanation before it can be counted as resolved."
             : "All flagged transactions were matched to a documented cause this run.";
  }
  if(lq.indexOf("waiver")>=0){
    var wf = (run.findings||[]).find(function(f){ return f.ratio.waiver_applied; });
    return wf ? "A signed waiver ("+wf.ratio.waiver_source+") is active and adjusts "+wf.ratio.metric+"'s limit from "+wf.ratio.base_threshold+" to "+wf.ratio.threshold+" for the current period. Without it, this covenant would be measured against the original, stricter limit."
              : "No waiver is currently active for the flagged covenants \u2014 they're measured against the original agreement limits.";
  }
  if(lq.indexOf("breach")>=0 || lq.indexOf("why")>=0 && lq.indexOf("flag")>=0){
    var breached = (run.findings||[]).filter(function(f){ return f.ratio.breached; });
    if(breached.length) return breached.map(function(f){ return f.ratio.covenant_id+" ("+f.ratio.metric+") is at "+f.ratio.value+" against a limit of "+f.ratio.threshold+" \u2014 outside the permitted range."; }).join(" ");
    return "No covenant is currently in breach; some are drifting toward their limits, which is why they're flagged for attention.";
  }
  if(lq.indexOf("recommend")>=0 || lq.indexOf("next")>=0 || lq.indexOf("action")>=0){
    return "Recommended next step: request an updated compliance certificate from the borrower, and if the leverage trend continues, evaluate the Equity Cure right under Section 7.4 before the next test date.";
  }
  return "For "+esc(run.borrower)+": severity is "+run.severity+" with "+Math.round(run.confidence*100)+"% cause-attribution confidence. Ask me about a specific covenant, an unexplained transaction, or the waiver status for more detail.";
}
function fmtMoney(n){ return "$"+Number(n).toLocaleString(); }

function render(){
  if(screen=="landing")renderLanding();
  else if(screen=="signin")renderSignIn();
  else renderApp();
}
