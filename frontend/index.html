<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CovenantOps Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
*{box-sizing:border-box}
body{margin:0;background:#0A0A0F;color:#E0E0E8;font-family:'IBM Plex Mono','JetBrains Mono',ui-monospace,monospace;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:1200px;margin:0 auto;padding:0 24px}
.bggrid{position:fixed;inset:0;opacity:.035;background-image:linear-gradient(#FF4444 1px,transparent 1px),linear-gradient(90deg,#FF4444 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
a{color:inherit;text-decoration:none}
button{font-family:inherit}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#1E1E2E;border-radius:4px}

/* ---- shared ---- */
.logomark{background:linear-gradient(135deg,#FF4444,#FF8C42);border-radius:8px;display:grid;place-items:center;font-weight:800;color:#0A0A0F}
.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;border:1px solid;padding:3px 10px;font-size:11px;font-weight:600;letter-spacing:.02em}
.pill.signal{background:#06D6A020;color:#06D6A0;border-color:#06D6A040}
.pill.amber{background:#FFD16620;color:#FFD166;border-color:#FFD16640}
.pill.oxblood{background:#FF444420;color:#FF4444;border-color:#FF444440}
.pill.mute{background:#1E1E2E;color:#8B8BA0;border-color:#2E2E3E}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}

/* ---- landing ---- */
.lnav{padding:20px 40px;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:10}
.lbrand{display:flex;align-items:center;gap:14px}
.lsignin{padding:10px 28px;border-radius:8px;border:1px solid #FF444460;background:transparent;color:#FF4444;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.lsignin:hover{background:#FF4444;color:#fff}
.hero{padding:64px 40px 60px;max-width:1200px;margin:0 auto;position:relative;z-index:10}
.eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:24px}
.eyebrow .line{width:32px;height:1px;background:#FF4444}
.eyebrow span{font-size:11px;color:#FF4444;text-transform:uppercase;letter-spacing:3px;font-weight:600}
h1.hero-title{font-size:52px;font-weight:800;color:#E0E0E8;line-height:1.08;margin:0 0 24px;max-width:820px;letter-spacing:-1px}
h1.hero-title .grad{background:linear-gradient(135deg,#FF4444,#FF8C42);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{font-size:16px;color:#8B8BA0;line-height:1.7;max-width:640px;margin:0 0 40px}
.hero-ctas{display:flex;gap:12px;margin-bottom:64px;flex-wrap:wrap}
.btn-primary{padding:14px 36px;border-radius:8px;border:none;background:linear-gradient(135deg,#FF4444,#FF6644);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 24px #FF444440;letter-spacing:.3px}
.btn-primary:hover{transform:translateY(-2px)}
.btn-ghost{padding:14px 28px;border-radius:8px;border:1px solid #2E2E3E;background:transparent;color:#8B8BA0;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-ghost:hover{border-color:#4E4E60;color:#E0E0E8}
.statstrip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#1E1E2E;border-radius:12px;overflow:hidden;margin-bottom:64px}
.statcell{padding:28px 24px;background:#101018}
.statval{font-size:32px;font-weight:800;color:#E0E0E8}
.statlabel{font-size:12px;color:#8B8BA0;font-weight:600;margin-top:4px}
.statsub{font-size:10px;color:#4E4E60;margin-top:2px}
.featgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:64px}
.featcard{padding:32px 28px;border-radius:12px;border:1px solid #1E1E2E;background:#0D0D14;transition:all .25s ease;cursor:default}
.featcard:hover{transform:translateY(-4px);background:#101018;border-color:color-mix(in srgb, var(--accent) 25%, transparent)}
.feat-icon{font-size:13px;font-weight:700;letter-spacing:.1em;margin-bottom:18px;color:var(--accent);opacity:.7;transition:opacity .25s}
.featcard:hover .feat-icon{opacity:1}
.feat-title{font-size:15px;font-weight:700;color:#E0E0E8;margin-bottom:10px}
.feat-desc{font-size:12px;color:#6B6B80;line-height:1.7}
.feat-rule{width:32px;height:2px;background:#1E1E2E;margin-top:20px;border-radius:1px;transition:all .3s}
.featcard:hover .feat-rule{width:40px;background:var(--accent)}
.archbox{background:#101018;border:1px solid #1E1E2E;border-radius:12px;padding:32px;margin-bottom:48px}
.archkick{font-size:10px;color:#6B6B80;text-transform:uppercase;letter-spacing:2px;margin-bottom:20px}
.archflow{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.archstep{padding:10px 18px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.3px}
.archarrow{color:#2E2E3E;font-size:18px}
.archnote{text-align:center;margin-top:16px;font-size:11px;color:#4E4E60}
.lfooter{display:flex;justify-content:space-between;align-items:center;padding:20px 0;border-top:1px solid #1E1E2E;font-size:11px;color:#4E4E60;flex-wrap:wrap;gap:8px}

/* ---- signin ---- */
.signin-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative}
.signin-box{width:400px;position:relative;z-index:10}
.signin-card{background:#101018;border:1px solid #1E1E2E;border-radius:14px;padding:36px;box-shadow:0 8px 40px rgba(0,0,0,.4)}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;color:#6B6B80;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.field input{width:100%;padding:12px 14px;border-radius:8px;border:1px solid #2E2E3E;background:#16161F;color:#E0E0E8;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.field input:focus{border-color:#FF444460}
.signin-btn{width:100%;padding:14px;border-radius:8px;border:none;background:linear-gradient(135deg,#FF4444,#FF6644);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 24px #FF444430;letter-spacing:.3px}
.signin-btn:disabled{background:#2E2E3E;box-shadow:none;cursor:wait}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #ffffff40;border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sso-btn{width:100%;padding:12px;border-radius:8px;border:1px solid #2E2E3E;background:transparent;color:#8B8BA0;font-size:12px;font-weight:500;cursor:pointer;margin-top:16px;transition:all .15s}
.sso-btn:hover{border-color:#4E4E60}
.envbadge{text-align:center;margin-top:24px}

/* ---- app shell ---- */
.topbar{background:#101018;border-bottom:1px solid #1E1E2E;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{font-size:15px;font-weight:600;color:#E0E0E8;letter-spacing:.5px}
.brandsub{font-size:10px;color:#6B6B80;letter-spacing:1.5px;text-transform:uppercase}
.navtabs{display:flex;gap:2px;background:#16161F;border-radius:8px;padding:3px}
.navbtn{padding:8px 16px;border-radius:6px;border:none;background:transparent;color:#6B6B80;cursor:pointer;font-size:12px;font-weight:400;transition:all .15s}
.navbtn.active{background:#1E1E2E;color:#E0E0E8;font-weight:600}
main{padding:24px 0 96px;position:relative;z-index:1}
.grid2{display:grid;gap:20px}
.grid3{display:grid;gap:20px}
@media(min-width:1024px){.grid2.a{grid-template-columns:1.1fr 1fr}.grid2.b{grid-template-columns:1.2fr 1fr}.grid2.c{grid-template-columns:1fr 1fr}.grid3{grid-template-columns:repeat(3,1fr)}}
.card{background:#101018;border:1px solid #1E1E2E;border-radius:10px;padding:20px;margin-bottom:16px}
.cardhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cardtitle{font-size:13px;font-weight:600;color:#8B8BA0;text-transform:uppercase;letter-spacing:1px}
.cardkick{font-size:11px;color:#4E4E60;text-transform:uppercase;letter-spacing:1px}
.stack>*+*{margin-top:16px}
p.lead{font-size:13px;line-height:1.6;color:#8B8BA0;margin:0 0 16px}
.runbtn{width:100%;border:none;border-radius:8px;background:linear-gradient(135deg,#FF4444,#FF6644);color:#fff;font-weight:700;font-size:14px;padding:14px;cursor:pointer;box-shadow:0 4px 24px #FF444430;transition:all .2s}
.runbtn:hover{transform:translateY(-2px)}
.ghostbtn{width:100%;border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;background:#06D6A015;border:1px solid #06D6A040;color:#06D6A0;margin-bottom:10px;transition:all .15s}
.ghostbtn:hover{background:#06D6A025}
.dangerbtn{width:100%;border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;background:#FF444415;border:1px solid #FF444440;color:#FF4444;margin-bottom:16px;transition:all .15s}
.dangerbtn:hover{background:#FF444425}
.proof{display:grid;grid-template-columns:1fr 1fr;gap:8px 24px;font-size:13px;color:#B8B8C8}
ol.flow{list-style:none;margin:0;padding:0}
ol.flow li{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.num{margin-top:1px;width:20px;height:20px;flex:none;border-radius:999px;display:grid;place-items:center;font-size:11px;background:#1E1E2E;color:#6B6B80}
.num.done{background:#06D6A0;color:#0A0A0F}
.gauge+.gauge{margin-top:16px}
.grow{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px}
.glabel{font-size:13px;color:#B8B8C8}
.gval{font-size:13px;font-weight:700}
.bar{position:relative;height:8px;border-radius:999px;background:#1E1E2E;overflow:hidden}
.barfill{height:100%;border-radius:999px;transition:width .8s ease}
.gmark{position:absolute;top:0;bottom:0;left:66%;width:2px;background:#4E4E60}
.gscale{display:flex;justify-content:space-between;margin-top:4px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#4E4E60}
table{width:100%;border-collapse:separate;border-spacing:0 4px;font-size:13px}
th{text-align:left;padding:8px 12px;font-size:10px;color:#6B6B80;text-transform:uppercase;letter-spacing:1px;font-weight:500}
td{padding:10px 12px;background:#16161F;white-space:nowrap}
tr td:first-child{border-radius:6px 0 0 6px}
tr td:last-child{border-radius:0 6px 6px 0}
.tblwrap{overflow-x:auto}
pre.memo{white-space:pre-wrap;font-size:12px;line-height:1.65;color:#C8C8D8;margin:0}
.scorerow{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.slabel{width:170px;flex:none;font-size:12px;color:#B8B8C8}
.sbar{flex:1;height:6px;border-radius:999px;background:#1E1E2E;overflow:hidden}
.sfill{height:100%;border-radius:999px;transition:width .6s ease}
.sval{width:36px;text-align:right;font-size:12px;font-weight:700}
.warn{font-size:12px;color:#B8B8C8;margin-bottom:8px}
.chk{font-size:13px;color:#B8B8C8;margin-bottom:8px}
.seal{display:inline-flex;align-items:center;gap:12px;border-radius:8px;border:1px solid;padding:12px 16px;animation:pop .5s cubic-bezier(.2,.8,.2,1) both}
@keyframes pop{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
.sealic{width:36px;height:36px;border-radius:999px;display:grid;place-items:center;font-size:18px;color:#0A0A0F}
.empty{text-align:center;padding:48px 0;font-size:12px;color:#4E4E60}
.qachip{padding:6px 12px;border-radius:16px;border:1px solid #2E2E3E;background:transparent;color:#8B8BA0;font-size:11px;cursor:pointer;transition:all .15s;margin:0 6px 6px 0}
.qachip:hover{border-color:#4CC9F040;color:#4CC9F0}
.qamsgs{max-height:280px;overflow-y:auto;margin-bottom:12px;padding:4px 0}
.qarow{display:flex;gap:10px;margin-bottom:12px}
.qarow.user{flex-direction:row-reverse}
.qaavatar{width:24px;height:24px;border-radius:6px;flex:none;display:grid;place-items:center;font-size:10px;font-weight:700}
.qabubble{max-width:78%;padding:10px 14px;border-radius:10px;font-size:12px;color:#C0C0D0;line-height:1.7}
.qagovbadge{display:flex;align-items:center;gap:6px;margin-top:6px;padding-top:6px;border-top:1px solid #1E1E2E;font-size:9px;color:#4E4E60}
.qainput{flex:1;padding:10px 14px;border-radius:8px;border:1px solid #2E2E3E;background:#16161F;color:#E0E0E8;font-size:12px;font-family:inherit;outline:none;transition:border-color .2s}
.qainput:focus{border-color:#4CC9F040}
.tlrow{display:flex;gap:16px;padding:12px 0;border-bottom:1px solid #1E1E2E}
.tlrow:last-child{border-bottom:none}
.tlstep{width:56px;flex:none;font-size:11px;color:#6B6B80}
.tldotwrap{width:8px;display:flex;flex-direction:column;align-items:center;flex:none}
.tldot{width:8px;height:8px;border-radius:50%;flex:none}
.tlline{width:1px;flex:1;background:#1E1E2E;margin-top:4px}
.tlbody{flex:1}
.tlhead{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.tltag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:9px;background:#1E1E2E;color:#8B8BA0}
.tldetail{font-size:12px;color:#8B8BA0}
@keyframes halogrow{0%{opacity:.6;transform:scale(1)}70%{opacity:0;transform:scale(1.9)}100%{opacity:0;transform:scale(1.9)}}
.pulse-halo{transform-origin:center;transform-box:fill-box;animation:halogrow 2s ease-out infinite}
    </style>
  </head>
  <body>
    <div class="bggrid"></div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
