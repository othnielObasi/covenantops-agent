# Production reverse proxy: serve the built SPA and proxy /api to the backend,
# so the browser talks to a single origin (no CORS, no backend host in the build).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Basic hardening headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;   # allow evidence-document uploads

    # API + docs -> FastAPI backend (compose service name "api")
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
    location = /docs { proxy_pass http://api:8000; proxy_set_header Host $host; }
    location = /openapi.json { proxy_pass http://api:8000; proxy_set_header Host $host; }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache built, fingerprinted assets aggressively
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
